<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <!-- ✅ Correct CSS link -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

  <h1>Login</h1>

  <p>
    Login as <b>Admin</b> or <b>Normal User</b>
  </p>

  <!-- ✅ Navigation -->
  <div class="nav">
    <a href="login.html">Login</a> |
    <a href="add-contributor.html">Add Contributor</a> |
    <a href="view-contributors.html">View Contributors</a>
  </div>

  <!-- ✅ Login form -->
  <label for="username">Admin/User Name</label>
  <input type="text" id="username" placeholder="admin1 or user1">

  <label for="password">Password</label>
  <input type="password" id="password" placeholder="1234">

  <button onclick="login()">Login</button>

  <!-- ✅ Result message -->
  <div id="result"></div>

</div>

<script>
  function login() {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      if (username.trim() === "" || password.trim() === "") {
          document.getElementById("result").innerText = "Please enter username and password";
          return;
      }


fetch(`/login?username=${username}&password=${password}`)
            .then(response => response.text())
            .then(data => {
                document.getElementById("result").innerText = data;
            })
            .catch(error => {
                document.getElementById("result").innerText = "Login failed";
                console.error(error);
            });
    }
</script>

</body>
</html>
